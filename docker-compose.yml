name: persona-mirror

services:
  frontend:
    image: node:24-alpine
    working_dir: /workspace
    command: sh -c "echo 'frontend scaffold pending' && tail -f /dev/null"
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh -c "echo 'backend scaffold pending' && tail -f /dev/null"
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  ai-worker:
    image: python:3.11-slim
    working_dir: /workspace
    command: sh -c "echo 'ai-worker scaffold pending' && tail -f /dev/null"
    volumes:
      - ./:/workspace
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: persona_mirror
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: persona
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
